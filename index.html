<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ご利用案内・お問い合わせ | NanoAct</title>
  <style>
    :root {
      --bg: #f6f6f6;
      --bg-accent: #efefef;
      --panel: rgba(255, 255, 255, 0.92);
      --line: #dddddd;
      --line-strong: #cfcfcf;
      --text: #1f1f1f;
      --muted: #6a6a6a;
      --soft: #f1f1f1;
      --shadow: 0 18px 40px rgba(0, 0, 0, 0.06);
      --shadow-hover: 0 22px 48px rgba(0, 0, 0, 0.09);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Hiragino Sans", "Yu Gothic", "Noto Sans JP", sans-serif;
      color: var(--text);
      line-height: 1.7;
      background:
        radial-gradient(circle at top left, #ffffff 0%, transparent 34%),
        radial-gradient(circle at bottom right, var(--bg-accent) 0%, transparent 28%),
        var(--bg);
    }

    .wrap {
      width: min(920px, calc(100% - 32px));
      margin: 0 auto;
      padding: 40px 0 56px;
    }

    .hero {
      position: relative;
      overflow: hidden;
      padding: 40px 34px 34px;
      margin-bottom: 20px;
      background: linear-gradient(180deg, rgba(255,255,255,0.98) 0%, rgba(250,250,250,0.92) 100%);
      border: 1px solid var(--line);
      border-radius: 24px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(8px);
    }

    .hero::after {
      content: "";
      position: absolute;
      top: -40px;
      right: -20px;
      width: 180px;
      height: 180px;
      border-radius: 50%;
      background: linear-gradient(135deg, rgba(0,0,0,0.03), rgba(0,0,0,0));
      pointer-events: none;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 12px;
      margin-bottom: 14px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255,255,255,0.9);
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.06em;
    }

    .eyebrow::before {
      content: "";
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #bdbdbd;
      display: inline-block;
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(32px, 5vw, 46px);
      line-height: 1.15;
      letter-spacing: -0.02em;
      font-weight: 800;
    }

    .lead {
      max-width: 620px;
      margin: 0;
      color: var(--muted);
      font-size: 15px;
    }

    .links {
      display: grid;
      gap: 16px;
    }

    .link-card {
      display: grid;
      grid-template-columns: 64px 1fr auto;
      gap: 18px;
      align-items: center;
      text-decoration: none;
      color: var(--text);
      padding: 22px 22px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: var(--shadow);
      transition:
        transform 0.18s ease,
        box-shadow 0.18s ease,
        border-color 0.18s ease,
        background-color 0.18s ease;
      backdrop-filter: blur(8px);
    }

    .link-card:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-hover);
      border-color: var(--line-strong);
      background: rgba(255, 255, 255, 0.98);
    }

    .icon {
      width: 64px;
      height: 64px;
      border-radius: 18px;
      border: 1px solid var(--line);
      background: linear-gradient(180deg, #fbfbfb 0%, #efefef 100%);
      display: grid;
      place-items: center;
      font-size: 26px;
      color: #505050;
      flex-shrink: 0;
    }

    .content h2 {
      margin: 0 0 6px;
      font-size: 24px;
      line-height: 1.3;
      letter-spacing: -0.01em;
    }

    .content p {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
    }

    .meta {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
      white-space: nowrap;
    }

    .meta::after {
      content: "→";
      font-size: 18px;
      transition: transform 0.18s ease;
    }

    .link-card:hover .meta::after {
      transform: translateX(4px);
    }

    @media (max-width: 720px) {
      .wrap {
        width: min(100%, calc(100% - 20px));
        padding: 20px 0 40px;
      }

      .hero {
        padding: 28px 20px 24px;
        border-radius: 20px;
      }

      .link-card {
        grid-template-columns: 56px 1fr;
        padding: 18px;
        border-radius: 18px;
      }

      .icon {
        width: 56px;
        height: 56px;
        border-radius: 16px;
        font-size: 22px;
      }

      .meta {
        grid-column: 2;
        margin-top: 4px;
      }

      .content h2 {
        font-size: 21px;
      }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="hero">
      <span class="eyebrow">NANOACT SUPPORT</span>
      <h1>ご利用案内・<br>お問い合わせ</h1>
      <p class="lead">
        ご利用方法の確認、お問い合わせ、緊急時の対応まで、
        必要な窓口へすぐアクセスできる総合案内ページです。
      </p>
    </section>

    <section class="links">
      <a class="link-card" href="https://ysakurai390.github.io/HUV_user-guide/" target="_blank" rel="noopener noreferrer">
        <div class="icon">?</div>
        <div class="content">
          <h2>使い方・よくある質問</h2>
          <p>車両の基本的な使い方、操作方法、利用前の注意点、よくある質問を確認できます。</p>
        </div>
        <span class="meta">ページを開く</span>
      </a>

      <a class="link-card" href="https://forms.office.com/Pages/ResponsePage.aspx?id=tXXefBLjeEmMcUNczENLjFiwHE9kCUhPi9AHtulHIeRURFgySlZEM05XRko0MTFQUkUzUzdZNUwxWi4u" target="_blank" rel="noopener noreferrer">
        <div class="icon">✉</div>
        <div class="content">
          <h2>お問い合わせフォーム</h2>
          <p>ご不明点やご相談がある場合は、こちらのフォームから内容を送信してください。</p>
        </div>
        <span class="meta">フォームを開く</span>
      </a>

      <a class="link-card" href="https://ysakurai390.github.io/HUV_emergency-guide/" target="_blank" rel="noopener noreferrer">
        <div class="icon">!</div>
        <div class="content">
          <h2>緊急時のご案内</h2>
          <p>事故・接触や車両トラブルが起きた際の対応手順を確認できます。</p>
        </div>
        <span class="meta">ページを開く</span>
      </a>
    </section>
  </main>
</body>
</html>
